name: "🐛 Bug Report"
description: "Report a problem or unexpected behavior in the XSD Schema Explorer."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting! Please fill out the form below."
  - type: input
    id: vs-code-ver
    attributes:
      label: "VS Code Version"
      placeholder: "e.g., 1.85.0"
    validations:
      required: true
  - type: input
    id: extension-ver
    attributes:
      label: "Extension Version"
      placeholder: "e.g., v1.4.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options: ["Windows", "macOS", "Linux"]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description of the Issue"
      placeholder: "What happened?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      placeholder: "1. Open file...\n2. Click..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs"
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: "Code of Conduct"
      options:
        - label: "I agree to follow this project's Code of Conduct"
          required: true
